name: 'Markdownlint'
description: 'Run Markdown linter with shared configuration'

runs:
  using: 'composite'
  steps:
    - name: Determine changed Markdown files
      id: changed
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        echo "Detecting changed Markdown files..."

        # If this is a pull request, compare with the base branch
        if [ "$EVENT_NAME" = "pull_request" ]; then
          echo "Finding changed files in PR..."
          git fetch origin "$BASE_REF" --depth=1
          FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" | grep '\.md$' || true)
        else
          echo "Finding changed files in push..."
          FILES=$(git diff --name-only HEAD^ HEAD | grep '\.md$' || true)
        fi

        # Remove newlines and make a whitespace separated list, ensure empty if no file is found
        FILES=$(echo "$FILES" | tr '\n' ' ' | xargs)
        echo "files=$FILES" >> "$GITHUB_OUTPUT"

    - name: Install markdownlint-cli2
      if: ${{ steps.changed.outputs.files != '' }}
      shell: bash
      run: npm install -g markdownlint-cli2@0.22.0

    - name: Run markdownlint
      if: ${{ steps.changed.outputs.files != '' }}
      shell: bash
      env:
        FILES: ${{ steps.changed.outputs.files }}
        MDL_CONFIG_PATH: ${{ github.action_path }}/.markdownlint.json
      run: |
        echo "Linting changed Markdown files:"
        markdownlint-cli2 --config "$MDL_CONFIG_PATH" $FILES
