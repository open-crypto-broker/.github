name: Dependency Version Check

on:
  schedule:
    - cron: '23 6 * * 1' # Every Monday ~6:23 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: dependency-version-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-versions:
    name: Check for dependency updates
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for checkout
      issues: write # needed to create/update issue with update info

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY_FILE: ${{ runner.temp }}/issue-body.md
        run: ./scripts/check-dependency-updates.sh

      - name: Create or update issue
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY_FILE: ${{ runner.temp }}/issue-body.md
        run: |
          TITLE="chore(deps): dependency updates available"

          # Find existing open issue by title
          EXISTING=$(gh issue list --search "\"$TITLE\" in:title" --state open --json number -q '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file "$ISSUE_BODY_FILE"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body-file "$ISSUE_BODY_FILE"
            echo "Created new issue"
          fi
