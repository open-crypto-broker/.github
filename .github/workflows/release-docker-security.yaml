name: Reusable Release Docker and Security

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
        description: 'Release tag (e.g., v1.2.3 or v1.2.3-rc1)'
      commit:
        type: string
        required: true
        description: 'Full commit SHA'
      is_rc:
        type: string
        required: true
        description: 'Whether this is a release candidate (true/false)'
      image_name:
        type: string
        required: true
        description: 'Docker image name (e.g., server, server-rc)'
      image_repo:
        type: string
        required: true
        description: 'Full GHCR image repository path'
      sbom_file:
        type: string
        required: true
        description: 'SBOM output filename'

permissions: {}

jobs:

  ################################################
  # Build Docker image
  ################################################
  docker:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io/open-crypto-broker
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image and push
        id: build
        uses: open-crypto-broker/.github/actions/publish-ghcr@main # nolint # zizmor: ignore[unpinned-uses]
        with:
          is_rc: ${{ inputs.is_rc }}
          registry: ghcr.io/open-crypto-broker
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.tag }}
          image_sha: ${{ inputs.commit }}

      - name: Print digest
        run: echo "Digest=${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

  ################################################
  # SBOM + Security Scan
  ################################################
  security:
    needs: docker
    permissions:
      contents: write
      packages: read
      security-events: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build image reference
        id: image
        run: |
          echo "ref=${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          DIGEST: ${{ needs.docker.outputs.digest }}

      - name: Debug image
        run: |
          echo "Image ref: ${IMAGE_REF}"
          docker pull "${IMAGE_REF}"
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.image.outputs.ref }}
          format: spdx-json
          output-file: ${{ inputs.sbom_file }}

      - name: Scan image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.image.outputs.ref }}
          fail-build: true
          severity-cutoff: high

      - name: Upload SBOM to GitHub Release
        if: inputs.is_rc != 'true'
        run: gh release upload "$GITHUB_REF_NAME" "$SBOM_FILE" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBOM_FILE: ${{ inputs.sbom_file }}

      - name: Setup ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Login to GHCR
        run: |
          echo "${GH_TOKEN}" \
          | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach SBOM to image (OCI referrer)
        run: |
          oras attach "${IMAGE_REF}" "${SBOM_FILE}" \
            --artifact-type application/spdx+json
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          SBOM_FILE: ${{ inputs.sbom_file }}
