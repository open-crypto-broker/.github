name: 'Build and Release Binaries'

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
        description: go | js
      app-name:
        type: string
        required: true
      tag:
        type: string
        required: true

      # Define tasks to run
      build-task:
        type: string
        required: false
        default: build
      ci-task:
        type: string
        required: false
        default: ci

      # Node.js
      node-version:
        type: string
        required: false
        default: "22"

permissions:
  contents: write   # required for GitHub Releases
  packages: write   # required for pushing to GHCR

jobs:
  build:
    name: Build binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # see https://docs.github.com/en/actions/reference/runners/github-hosted-runners
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-14
            suffix: macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -- Language setup --

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: go.mod

      - name: Setup Node.js
        if: inputs.language == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      # -- Build steps --

      - name: Setup Task
        uses: go-task/setup-task@v1
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI task
        run: task ${{ inputs.ci-task }}

      - name: Run build task
        run: |
          task ${{ inputs.build-task }}
          mkdir -p build
          cp bin/${{ inputs.app-name }} build/

      - name: Create ZIP package
        shell: bash
        run: |
          ARCHIVE="${{ inputs.app-name }}-${{ inputs.tag }}-${{ matrix.suffix }}.zip"
          cd build
          zip -r "../$ARCHIVE" "${{ inputs.app-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app-name }}-${{ matrix.suffix }}
          path: ${{ inputs.app-name }}-${{ inputs.tag }}-${{ matrix.suffix }}.zip

  gh-release:
    name: Upload artifacts to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ghcr-release:
    name: Upload binaries to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Setup ORAS for GHCR access
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Login to GHCR with ORAS
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push binaries to GHCR
        run: |
          TAG="${{ inputs.tag }}"

          find dist -type f -name "*.zip" | while read -r file; do
            BASENAME=$(basename "$file" .zip)

            # Extract platform suffix (last part after last dash)
            PLATFORM="${BASENAME##*-}"

            oras push \
              ghcr.io/${{ github.repository }}/${{ inputs.app-name }}-binary-${PLATFORM}:${TAG} \
              "$file" \
              --artifact-type application/zip
          done
