name: 'Build and Release Binaries'

on:
  workflow_call:
    inputs:
      # Create a release candidate if the tag contains '-rc', otherwise create a normal release
      is_rc:
        type: string
        required: false
        default: "false"
      # Build metadata input
      language:
        type: string
        required: true
        description: go | js
      build-name:
        type: string
        required: true
      tag:
        type: string
        required: true
      # Define tasks to run
      build-task:
        type: string
        required: false
        default: build
      ci-task:
        type: string
        required: false
        default: ci
      # Node.js
      node-version:
        type: string
        required: false
        default: "24"

permissions:
  contents: write   # required for GitHub Releases
  packages: write   # required for pushing to GHCR

jobs:
  build:
    name: Build binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # see https://docs.github.com/en/actions/reference/runners/github-hosted-runners
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-14
            suffix: macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      # -- Language setup --
      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Setup Node.js
        if: inputs.language == 'js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      # -- Build steps --
      - name: Setup Task
        uses: go-task/setup-task@v1
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI task
        run: task ${{ inputs.ci-task }}

      - name: Run build task
        run: |
          task ${{ inputs.build-task }} APP_NAME=${{ inputs.build-name }}
          mkdir -p build
          cp bin/${{ inputs.build-name }} build/

      - name: Create ZIP package
        shell: bash
        run: |
          ARCHIVE="${{ inputs.build-name }}-${{ inputs.tag }}-${{ matrix.suffix }}.zip"
          cd build
          zip -r "../$ARCHIVE" "${{ inputs.build-name }}"

      # -- Upload artifact for later steps --
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.build-name }}-${{ matrix.suffix }}
          path: ${{ inputs.build-name }}-${{ inputs.tag }}-${{ matrix.suffix }}.zip

  gh-release:
    name: Upload artifacts to release
    needs: build
    if: (startsWith(github.ref, 'refs/tags/')) && inputs.is_rc != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ghcr-release:
    name: Upload binaries to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Setup ORAS for GHCR access
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Login to GHCR with ORAS
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          oras login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Push binaries to GHCR
        run: |
          TAG="${{ inputs.tag }}"
          APP="${{ inputs.build-name }}"
          REPO="ghcr.io/${{ github.repository_owner }}/${APP}"

          for file in dist/*.zip; do
            NAME=$(basename "$file" .zip)

            # Extract platform suffix from filename
            PLATFORM="${NAME##*-}"

            echo "Publishing $file for platform $PLATFORM"

            oras push \
              "${REPO}-binary-${PLATFORM}:${TAG}" \
              "$file:application/zip" \
              --annotation "org.opencontainers.image.title=${APP}" \
              --annotation "org.opencontainers.image.version=${TAG}" \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
          done
