name: Reusable Workflow Lint

on:
  workflow_call:

permissions: {}

jobs:
  lint:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Install zizmor
        run: pipx install zizmor==1.23.1

      - name: Run actionlint
        run: actionlint

      - name: Run zizmor
        run: zizmor --min-severity medium --persona=auditor .github/workflows/
