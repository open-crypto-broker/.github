name: Reusable Workflow Lint

on:
  workflow_call:
    inputs:
      paths:
        description: "Space-separated list of directory paths to check for changed files (e.g. '.github/workflows/ actions/')"
        required: false
        type: string
        default: '.github/workflows/'

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint GitHub Workflows
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed workflow files
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PATHS: ${{ inputs.paths }}
        run: |
          echo "Detecting changed workflow files..."

          # Build grep pattern from paths input
          GREP_PATTERN=$(echo "$PATHS" | tr ' ' '\n' | sed 's|/$||' | sed 's|^|^|; s|$|/|' | paste -sd '|' -)
          echo "Grep pattern: $GREP_PATTERN"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "Finding changed files in PR..."
            git fetch origin "$BASE_REF" --depth=1
            FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" | grep -E "$GREP_PATTERN" || true)
          else
            echo "Finding changed files in push..."
            FILES=$(git diff --name-only HEAD^ HEAD | grep -E "$GREP_PATTERN" || true)
          fi

          FILES=$(echo "$FILES" | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

          if [ -z "$FILES" ]; then
            echo "No workflow files changed. Skipping linting."
          else
            echo "Changed workflow files: $FILES"
          fi

      - name: Install actionlint
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Install zizmor
        if: ${{ steps.changed.outputs.files != '' }}
        run: pipx install zizmor==1.26.1

      - name: Run actionlint
        if: ${{ steps.changed.outputs.files != '' }}
        env:
          STEPS_CHANGED_OUTPUTS_FILES: ${{ steps.changed.outputs.files }}
        run: |
          # Filter out composite actions (actionlint only understands workflows)
          WORKFLOW_FILES=$(echo "$STEPS_CHANGED_OUTPUTS_FILES" | tr ' ' '\n' | grep -v '^actions/' | tr '\n' ' ' | xargs)
          if [ -n "$WORKFLOW_FILES" ]; then
            # shellcheck disable=SC2086
            actionlint ${WORKFLOW_FILES}
          else
            echo "No workflow files to lint with actionlint (only action files changed)."
          fi

      - name: Run zizmor
        if: ${{ steps.changed.outputs.files != '' }}
        env:
          STEPS_CHANGED_OUTPUTS_FILES: ${{ steps.changed.outputs.files }}
        run: |
          # shellcheck disable=SC2086
          zizmor --min-severity medium --persona=auditor ${STEPS_CHANGED_OUTPUTS_FILES}
