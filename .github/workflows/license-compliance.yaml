name: Reusable License Compliance Check

on:
  workflow_call:
    inputs:
      directory_to_scan:
        description: "Directory to scan for license compliance"
        required: false
        type: string
        default: "."

concurrency:
  group: ${{ github.workflow }}-license-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  license-check:
    name: License Compliance Check
    permissions:
      contents: read # required for checkout
    runs-on: ubuntu-latest

    steps:
      ################################################
      # Sanity checks
      ################################################
      - name: Validate directory path input
        env:
          DIR_TO_SCAN: ${{ inputs.directory_to_scan }}
        run: |
          if [ -z "$DIR_TO_SCAN" ]; then
            echo "directory_to_scan is required"
            exit 1
          fi

      ################################################
      # Checkout PR branch and create SBOM
      ################################################
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate SBOM from PR
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.directory_to_scan }}
          format: spdx-json
          output-file: "sbom.spdx.json"

      - name: Extract license inventory from PR SBOM
        run: |
          jq -r '
            [.packages[] | {name: .name, version: .versionInfo, license: (.licenseConcluded // .licenseDeclared // "UNKNOWN")}]
            | sort_by(.license, .name)
            | .[]
            | "\(.license)\t\(.name)@\(.version)"
          ' sbom.spdx.json > license-inventory.txt
          {
            echo "### License Inventory (PR branch)"
            echo '```'
            cat license-inventory.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      ################################################
      # Checkout base branch (main) and create SBOM
      ################################################
      - name: Checkout base branch (main)
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .base-branch
          persist-credentials: false

      - name: Generate SBOM from base branch
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .base-branch/${{ inputs.directory_to_scan }}
          format: spdx-json
          output-file: "sbom-base.spdx.json"

      ################################################
      # Compute license diff (base → PR)
      ################################################
      - name: Compute license diff (base → PR)
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        run: |
          jq -r '
            [.packages[] | {name: .name, version: .versionInfo, license: (.licenseConcluded // .licenseDeclared // "UNKNOWN")}]
            | sort_by(.license, .name)
            | .[]
            | "\(.license)\t\(.name)@\(.version)"
          ' sbom-base.spdx.json | sed 's|\.base-branch/||g' > license-inventory-base.txt
          # Remove the base-branch prefix from SBOM file paths otherwise diff will show changed files instead of just changed licenses

          {
            echo "### License Diff (base → PR)"
            if diff license-inventory-base.txt license-inventory.txt > license-diff.txt; then
              echo "No license changes detected."
            else
              echo '```diff'
              diff --unified=0 --label base --label pr license-inventory-base.txt license-inventory.txt || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      ################################################
      # Check overall license compliance
      ################################################
      - name: Checkout grant-check action
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: open-crypto-broker/.github
          ref: main
          path: .grant-check-action
          sparse-checkout: actions/grant-check
          persist-credentials: false

      - name: Check license compliance
        uses: ./.grant-check-action/actions/grant-check
        with:
          sbom-file: sbom.spdx.json

      - name: Upload SBOM artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: license-compliance-sbom
          path: sbom.spdx.json
          retention-days: 5
