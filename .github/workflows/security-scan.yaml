name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      # Docker image scan input
      scan_image:
        description: "Scan a container image"
        required: false
        type: boolean
        default: false

      image_name:
        description: "Base image name (without tag)"
        required: false
        type: string

      # Directory scan input (SBOM)
      scan_directory:
        description: "Scan directory for SBOM generation"
        required: false
        type: boolean
        default: false

      directory_to_scan:
        description: "Directory to scan"
        required: false
        type: string

permissions: {}

concurrency:
  group: security-scan-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ################################################
  # Grype: Docker Image Security Scan
  ################################################
  scan-image:
    name: Docker Image Security Scan
    permissions:
      contents: read      # required for checkout
      packages: read      # required for pulling images from GHCR
      security-events: write # required for uploading SARIF to GitHub Security tab
    if: inputs.scan_image
    runs-on: ubuntu-latest

    steps:
      - name: Validate image input
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          if [ -z "$IMAGE_NAME" ]; then
            echo "image_name is required when scan_image=true"
            exit 1
          fi

      - name: Determine latest release tag
        id: latest
        env:
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo "$REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve image digest
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "IMAGE_WITH_DIGEST=${IMAGE_NAME}@$DIGEST" >> "$GITHUB_ENV"

      - name: Scan image with Grype
        id: scan_image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.IMAGE_WITH_DIGEST }}
          fail-build: true
          severity-cutoff: medium # Only fail the image scan for medium and above vulnerabilities
          output-format: sarif # Generate SARIF for GitHub Security

      - name: Upload docker image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always() # Ensures results are uploaded even if the scan found vulnerabilities
        with:
          sarif_file: ${{ steps.scan_image.outputs.sarif }}
          category: docker-image-scan

      - name: Upload docker image scan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: docker-image-scan-results
          path: ${{ steps.scan_image.outputs.sarif }}
          retention-days: 5

  ################################################
  # Syft + Grype: Dependency SBOM Security Scan
  ################################################
  scan-sbom:
    name: Dependency SBOM Security Scan
    permissions:
      contents: read      # required for checkout
      security-events: write # required for uploading SARIF to GitHub Security tab
    if: inputs.scan_directory
    runs-on: ubuntu-latest

    steps:
      - name: Validate directory path input
        env:
          DIR_TO_SCAN: ${{ inputs.directory_to_scan }}
        run: |
          if [ -z "$DIR_TO_SCAN" ]; then
            echo "directory_to_scan is required when scan_directory=true"
            exit 1
          fi

          if [ ! -d "$DIR_TO_SCAN" ]; then
            echo "Directory does not exist: $DIR_TO_SCAN"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.directory_to_scan }}
          format: spdx-json
          output-file: "sbom.spdx.json"

      - name: Scan SBOM
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan_sbom
        with:
          sbom: "sbom.spdx.json"
          fail-build: true
          severity-cutoff: medium # Only fail the image scan for medium and above vulnerabilities
          output-format: sarif # Generate SARIF for GitHub Security

      - name: Upload SBOM SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.scan_sbom.outputs.sarif }}
          category: sbom-scan

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-scan-results
          path: ${{ steps.scan_sbom.outputs.sarif }}
          retention-days: 5
